name: Worker Check

on:
  push:
    paths:
      - 'worker/**'
      - '.github/workflows/worker-check.yml'
  pull_request:
    paths:
      - 'worker/**'
      - '.github/workflows/worker-check.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: worker/pnpm-lock.yaml
      - run: pnpm --config.minimumReleaseAge=0 install --frozen-lockfile
      - run: pnpm --config.minimumReleaseAge=0 run typecheck
      - run: pnpm --config.minimumReleaseAge=0 test
