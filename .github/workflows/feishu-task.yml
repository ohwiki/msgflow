name: Feishu Task

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'fetch / rewrite / skill / ingest / query / lint / distill'
        required: true
        type: string
      target:
        description: 'URL, file path, or question'
        required: true
        type: string
      style:
        description: 'lu-xun / ma-sanli / xu-zhimo'
        required: false
        type: string
        default: ''
      skill:
        description: 'skill name'
        required: false
        type: string
        default: ''
      chat_id:
        description: 'callback chat id'
        required: true
        type: string
      callback_url:
        description: 'callback url'
        required: true
        type: string
      config:
        description: 'JSON config from Worker KV'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install NullClaw
        run: |
          curl -sL -o /usr/local/bin/nullclaw https://github.com/nullclaw/nullclaw/releases/download/v2026.5.4/nullclaw-linux-x86_64.bin
          chmod +x /usr/local/bin/nullclaw

      - name: Load config
        id: cfg
        run: |
          # 非敏感配置从 input 解析
          if [ -n '${{ inputs.config }}' ]; then
            export NULLCLAW_BASE_URL=$(echo '${{ inputs.config }}' | jq -r '.nullclaw_base_url // empty')
            export NULLCLAW_MODEL=$(echo '${{ inputs.config }}' | jq -r '.nullclaw_model // empty')
            export WIKI_REPO=$(echo '${{ inputs.config }}' | jq -r '.wiki_repo // empty')
            export TASK_TIMEOUT=$(echo '${{ inputs.config }}' | jq -r '.task_timeout // empty')
            export PUBLISH_TARGET=$(echo '${{ inputs.config }}' | jq -r '.publish_target // empty')
            export FEISHU_WIKI_SPACE=$(echo '${{ inputs.config }}' | jq -r '.feishu_wiki_space // empty')
          fi

          # 敏感配置从 Worker 拉取
          INTERNAL_URL=$(echo "${{ inputs.callback_url }}" | sed 's|/callback$|/internal/config|')
          secrets_json=$(curl -sf -X POST "$INTERNAL_URL" \
            -H "Content-Type: application/json" \
            -d "{\"secret\":\"${{ secrets.CALLBACK_SECRET }}\"}" 2>/dev/null || echo "{}")

          if [ "$secrets_json" != "{}" ]; then
            export NULLCLAW_API_KEY=$(echo "$secrets_json" | jq -r '.nullclaw_api_key // empty')
            export MOWEN_API_KEY=$(echo "$secrets_json" | jq -r '.mowen_api_key // empty')
            export UNSPLASH_KEY=$(echo "$secrets_json" | jq -r '.unsplash_key // empty')
            export LLMWIKI_TOKEN=$(echo "$secrets_json" | jq -r '.llmwiki_token // empty')
          fi

          # Fallback 到 GitHub Secrets/Variables（向后兼容）
          : ${NULLCLAW_API_KEY:=${{ secrets.NULLCLAW_API_KEY }}}
          : ${NULLCLAW_BASE_URL:=${{ secrets.NULLCLAW_BASE_URL }}}
          : ${NULLCLAW_MODEL:=${{ vars.NULLCLAW_MODEL }}}
          : ${MOWEN_API_KEY:=${{ secrets.MOWEN_API_KEY }}}
          : ${UNSPLASH_KEY:=${{ secrets.UNSPLASH_KEY }}}
          : ${LLMWIKI_TOKEN:=${{ secrets.LLMWIKI_TOKEN }}}
          : ${WIKI_REPO:=${{ vars.WIKI_REPO }}}
          : ${TASK_TIMEOUT:=600}
          : ${PUBLISH_TARGET:=mowen}

          # 导出到后续 steps
          echo "NULLCLAW_API_KEY=$NULLCLAW_API_KEY" >> $GITHUB_ENV
          echo "NULLCLAW_BASE_URL=$NULLCLAW_BASE_URL" >> $GITHUB_ENV
          echo "NULLCLAW_MODEL=$NULLCLAW_MODEL" >> $GITHUB_ENV
          echo "MOWEN_API_KEY=$MOWEN_API_KEY" >> $GITHUB_ENV
          echo "UNSPLASH_KEY=$UNSPLASH_KEY" >> $GITHUB_ENV
          echo "LLMWIKI_TOKEN=$LLMWIKI_TOKEN" >> $GITHUB_ENV
          echo "WIKI_REPO=$WIKI_REPO" >> $GITHUB_ENV
          echo "TASK_TIMEOUT=$TASK_TIMEOUT" >> $GITHUB_ENV
          echo "PUBLISH_TARGET=$PUBLISH_TARGET" >> $GITHUB_ENV
          echo "FEISHU_WIKI_SPACE=$FEISHU_WIKI_SPACE" >> $GITHUB_ENV

      - name: Checkout wiki repo
        if: env.WIKI_REPO != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WIKI_REPO }}
          path: llmwiki
          token: ${{ env.LLMWIKI_TOKEN }}
          ref: main

      - name: Configure NullClaw
        run: |
          nullclaw onboard --api-key "$NULLCLAW_API_KEY" --provider "custom:$NULLCLAW_BASE_URL" --model "${NULLCLAW_MODEL:-mimo-v2.5-pro}"
          nullclaw config set agent.message_timeout_secs ${TASK_TIMEOUT:-600}
          nullclaw config set autonomy.level autonomous
          nullclaw config set autonomy.allowed_commands '["*"]'
          nullclaw config set autonomy.workspace_only false
          nullclaw config set security.sandbox.enabled false
          nullclaw config set http_request.enabled true
          nullclaw config set browser.enabled true

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml requests markdownify pypinyin
          pip install -e python/
          playwright install chromium
          # 安装 mowen-cli
          curl -fSL -o /usr/local/bin/mowen-cli https://github.com/ohmycli/mowen-cli/releases/download/v0.4.0/mowen-cli-linux-x86_64
          chmod +x /usr/local/bin/mowen-cli
          /usr/local/bin/mowen-cli --version
          # 安装 lark-cli（飞书 CLI）
          npm install -g @larksuite/cli || true

      - name: Configure lark-cli
        if: env.FEISHU_APP_ID != ''
        run: |
          lark-cli config set app_id "$FEISHU_APP_ID" 2>/dev/null || true
          lark-cli config set app_secret "$FEISHU_APP_SECRET" 2>/dev/null || true

      - name: Install skills
        run: |
          mkdir -p ~/.nullclaw/workspace/skills
          for d in skills/*/; do [ -f "$d/SKILL.md" ] && cp -r "$d" ~/.nullclaw/workspace/skills/$(basename "$d"); done
          for d in skills/writers/*/; do [ -f "$d/SKILL.md" ] && cp -r "$d" ~/.nullclaw/workspace/skills/$(basename "$d"); done
          # 安装 llmwiki 自带的 skills（如果配置了知识库仓库）
          if [ -d llmwiki/.agents/skills ]; then
            for d in llmwiki/.agents/skills/*/; do [ -f "$d/SKILL.md" ] && cp -r "$d" ~/.nullclaw/workspace/skills/$(basename "$d"); done
          fi

      - name: Execute task
        id: task
        run: |
          ACTION="${{ github.event.inputs.action }}"
          TARGET="${{ github.event.inputs.target }}"
          STYLE="${{ github.event.inputs.style }}"
          SKILL="${{ github.event.inputs.skill }}"

          case "$ACTION" in
            rewrite)        python python/src/run_task.py rewrite "$TARGET" --style "$STYLE" ;;
            skill)          python python/src/run_task.py skill "$TARGET" --skill "$SKILL" ;;
            pending|lint)   python python/src/run_task.py "$ACTION" ;;
            *)              python python/src/run_task.py "$ACTION" "$TARGET" ;;
          esac || true

          if [ -f /tmp/result.txt ] && [ -s /tmp/result.txt ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: Callback
        if: always()
        run: |
          result=$(cat /tmp/result.txt 2>/dev/null || echo "执行失败")
          status="${{ steps.task.outputs.status || 'error' }}"
          curl -s -X POST "${{ github.event.inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg secret "${{ secrets.CALLBACK_SECRET }}" --arg chat_id "${{ github.event.inputs.chat_id }}" --arg status "$status" --arg result "$result" '{secret: $secret, chat_id: $chat_id, status: $status, result: $result}')"

      - name: Commit nullclaw-ci results
        if: steps.task.outputs.status == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "Task: ${{ github.event.inputs.action }}" && git pull --rebase origin main && git push)

      - name: Commit wiki changes
        if: steps.task.outputs.status == 'success' && env.WIKI_REPO != ''
        run: |
          cd llmwiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "wiki: ${{ github.event.inputs.action }} - ${{ github.event.inputs.target }}" && git push)
