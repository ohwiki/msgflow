name: Worker v2 Check

on:
  push:
    paths:
      - 'worker-v2/**'
      - '.github/workflows/worker-v2-check.yml'
  pull_request:
    paths:
      - 'worker-v2/**'
      - '.github/workflows/worker-v2-check.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-v2
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: worker-v2/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --config.minimumReleaseAge=0
      - run: pnpm run typecheck
      - run: pnpm test
