name: Worker v2 Check

on:
  push:
    paths: ['worker-v2/**']
  pull_request:
    paths: ['worker-v2/**']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker-v2/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm test
